upstream backend {
    server backend:3000;
}

server {
    listen 80;
    server_name lbgaufscar.com.br www.lbgaufscar.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lbgaufscar.com.br www.lbgaufscar.com.br;
    ssl_certificate /etc/letsencrypt/live/lbgaufscar.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lbgaufscar.com.br/privkey.pem;

    location /api/ {
        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}