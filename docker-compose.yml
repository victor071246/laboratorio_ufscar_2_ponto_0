services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: usuario_lab
      POSTGRES_PASSWORD: Lab@2802prod
      POSTGRES_DB: lab_ufscar
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./laboratorio_backend/
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://usuario_lab:Lab@2802prod@db:5432/lab_ufscar
      JWT_SECRET: 'Segredo@TokenJWT_!@12314'
      JWT_EXPIRATION_HOURS: 8
      HOST: 0.0.0.0
      PORT: 3000
      RUST_LOG: info
    depends_on:
      - db

  frontend:
    build:
      context: ./laboratorio_frontend/
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/dist

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - frontend_dist:/usr/share/nginx/html:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  frontend_dist:
